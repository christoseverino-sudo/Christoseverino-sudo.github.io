<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuenta - Dulce Tentación</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background-image: url("imagenes/fondo.jpg");
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }

    .container {
      width: 420px;
      background: rgba(255, 238, 242, 0.75);
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.7s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tabs {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .tab {
      width: 50%;
      text-align: center;
      padding: 12px 0;
      cursor: pointer;
      font-weight: 600;
      color: #a94463;
      border-bottom: 3px solid transparent;
      transition: 0.3s;
    }

    .tab.active {
      color: #c75b7a;
      border-bottom: 3px solid #c75b7a;
    }

    form {
      display: none;
      flex-direction: column;
      animation: fadeIn 0.5s ease;
    }

    form.active {
      display: flex;
    }

    label {
      margin: 8px 0 5px;
      font-weight: 600;
      color: #a94463;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: 2px solid #ffc7d1;
      background: white;
      outline: none;
      margin-bottom: 12px;
      transition: 0.2s;
    }

    input:focus {
      border-color: #c75b7a;
    }

    button {
      padding: 12px;
      background: #c75b7a;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
      transition: background .3s;
    }

    button:hover {
      background: #a94463;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-weight: 600;
      color: #a94463;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Pestañas -->
    <div class="tabs">
      <div class="tab active" id="tab-login">Iniciar Sesión</div>
      <div class="tab" id="tab-register">Registrarse</div>
    </div>

    <!-- Formulario Login -->
    <form id="loginForm" class="active">
      <label>Correo electrónico</label>
      <input type="email" id="loginEmail" placeholder="ejemplo@gmail.com" required />

      <label>Contraseña</label>
      <input type="password" id="loginPassword" placeholder="********" required />

      <button type="button" onclick="login()">Entrar</button>
      <p class="msg" id="loginMsg"></p>
    </form>

    <!-- Formulario Registro -->
    <form id="registerForm">
      <label>Nombre completo</label>
      <input type="text" id="regName" placeholder="Tu nombre" required />

      <label>Correo electrónico</label>
      <input type="email" id="regEmail" placeholder="ejemplo@gmail.com" required />

      <label>Contraseña</label>
      <input type="password" id="regPassword" placeholder="********" required />

      <button type="button" onclick="register()">Registrarme</button>
      <p class="msg" id="regMsg"></p>
    </form>

  </div>

  <script>
    // Cambiar pestañas
    const tabLogin = document.getElementById("tab-login");
    const tabRegister = document.getElementById("tab-register");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    tabLogin.onclick = () => {
      tabLogin.classList.add("active");
      tabRegister.classList.remove("active");
      loginForm.classList.add("active");
      registerForm.classList.remove("active");
    };

    tabRegister.onclick = () => {
      tabRegister.classList.add("active");
      tabLogin.classList.remove("active");
      registerForm.classList.add("active");
      loginForm.classList.remove("active");
    };

    // REGISTRO
    function register() {
      const name = document.getElementById("regName").value;
      const email = document.getElementById("regEmail").value;
      const pass = document.getElementById("regPassword").value;
      const msg = document.getElementById("regMsg");

      let users = JSON.parse(localStorage.getItem("users")) || [];

      // Evitar correos duplicados
      if (users.some(u => u.email === email)) {
        msg.textContent = "⚠ Este correo ya está registrado.";
        return;
      }

      users.push({ name, email, pass });
      localStorage.setItem("users", JSON.stringify(users));

      msg.textContent = "✔ Registrado exitosamente. Ahora inicia sesión.";
    }

    // LOGIN
    function login() {
      const email = document.getElementById("loginEmail").value;
      const pass = document.getElementById("loginPassword").value;
      const msg = document.getElementById("loginMsg");

      let users = JSON.parse(localStorage.getItem("users")) || [];

      const user = users.find(u => u.email === email && u.pass === pass);

      if (!user) {
        msg.textContent = "❌ Correo o contraseña incorrectos.";
        return;
      }

      msg.textContent = "✔ Sesión iniciada.";

      // Guardar sesión
      localStorage.setItem("session", JSON.stringify(user));

      // REDIRECCIONAR (opcional)
      setTimeout(() => {
        window.location.href = "Inicio.html"; // CAMBIA A TU PÁGINA PRINCIPAL
      }, 800);
    }
  </script>

</body>
</html>
